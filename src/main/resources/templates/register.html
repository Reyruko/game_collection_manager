<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="EN">

<head>

    <meta charset="UTF-8">
    <title>TGV | Register</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/register.css}">

</head>

<body>

<div th:insert="~{fragments/nav-bar :: header}"></div>

    <main class="auth">
        <form th:action="@{/register}"
          method="post">

            <h2>Create Adventurer</h2>
            <input  name="username"
                placeholder="Username">

            <input  name="email"
                placeholder="Email">

            <input  name="password"
                type="password"
                placeholder="Password">

            <button>
            CLAIM TREASURE
            </button>
        </form>
    </main>

<div th:insert="~{fragments/footer :: footer}"></div>

</body>

</html>
